<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brute Force Lottery Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Brute Force Lottery Simulator</h1>

        <div class="controls">
            <button id="buy1">Buy 1 Ticket</button>
            <button id="buy100">Buy 100 Tickets</button>
            <button id="autoRun">Auto-Run</button>
        </div>

        <div class="stats">
            <p><strong>Winning Numbers:</strong> <span id="winningNumbers">-</span></p>
            <p><strong>Tickets Bought:</strong> <span id="ticketsBought">0</span></p>
            <p><strong>Total Spent:</strong> $<span id="totalSpent">0</span></p>
            <p><strong>Status:</strong> <span id="status">Waiting...</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
